name: CI

on:
  push:
    branches: [main, generic-integration]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=center_of_mass_spiral --cov-report=term-missing

      - name: Check import works
        run: |
          python -c "import center_of_mass_spiral; print(f'Version: {center_of_mass_spiral.__version__}')"
